name: Build PawnREST Release Artifacts

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  CONFIG: MinSizeRel

jobs:

  linux-docker:
    name: Build Linux PawnREST.so (32-bit)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Verify SA-MP SDK availability
        run: |
          test -f deps/samp-plugin-sdk/plugincommon.h || {
            echo "deps/samp-plugin-sdk is missing. Commit it or add it as a git submodule before running CI."
            exit 1
          }

      - name: Prepare build folder (uid 1000 required by container)
        run: |
          set -eux
          for dir in build-omp build-samp build-omp-static-ssl; do
            mkdir -p "docker/${dir}"
            sudo chown 1000:1000 "docker/${dir}"
          done

      - name: Prepare Docker images (prebuilt + fallback)
        run: |
          docker pull pawnrest/build:ubuntu-18.04 || docker build -t pawnrest/build:ubuntu-18.04 docker/build_ubuntu-18.04/
          docker pull pawnrest/build:ubuntu-22.04-static-ssl || docker build -t pawnrest/build:ubuntu-22.04-static-ssl docker/build_ubuntu-22.04-static-ssl/

      - name: Build Linux open.mp (dynamic SSL)
        env:
          CONFIG: ${{ env.CONFIG }}
        run: |
          set -eux
          docker run --rm -t \
            -w /code \
            -v "${{ github.workspace }}:/code" \
            -v "${{ github.workspace }}/docker/build-omp:/code/build-omp" \
            -e CONFIG=${CONFIG} \
            -e BUILD_DIR=build-omp \
            -e BUILD_SAMP_PLUGIN=OFF \
            -e PAWNREST_ENABLE_TLS=ON \
            -e PAWNREST_TLS_STATIC_OPENSSL=OFF \
            pawnrest/build:ubuntu-18.04

      - name: Build Linux SA-MP plugin (dynamic SSL)
        env:
          CONFIG: ${{ env.CONFIG }}
        run: |
          set -eux
          docker run --rm -t \
            -w /code \
            -v "${{ github.workspace }}:/code" \
            -v "${{ github.workspace }}/docker/build-samp:/code/build-samp" \
            -e CONFIG=${CONFIG} \
            -e BUILD_DIR=build-samp \
            -e BUILD_SAMP_PLUGIN=ON \
            -e PAWNREST_ENABLE_TLS=ON \
            -e PAWNREST_TLS_STATIC_OPENSSL=OFF \
            pawnrest/build:ubuntu-18.04

      - name: Build Linux open.mp (static SSL)
        env:
          CONFIG: ${{ env.CONFIG }}
        run: |
          set -eux
          docker run --rm -t \
            -w /code \
            -v "${{ github.workspace }}:/code" \
            -v "${{ github.workspace }}/docker/build-omp-static-ssl:/code/build-omp-static-ssl" \
            -e CONFIG=${CONFIG} \
            -e BUILD_DIR=build-omp-static-ssl \
            -e BUILD_SAMP_PLUGIN=OFF \
            -e PAWNREST_ENABLE_TLS=ON \
            -e PAWNREST_TLS_STATIC_OPENSSL=ON \
            pawnrest/build:ubuntu-22.04-static-ssl

      - name: Normalize artifact permissions
        run: |
          set -eux
          sudo chown -R "$(id -u):$(id -g)" docker/build-omp docker/build-samp docker/build-omp-static-ssl
          chmod -R u+rwX docker/build-omp docker/build-samp docker/build-omp-static-ssl

      - name: Strip Linux binaries
        run: |
          set -eux
          strip --strip-unneeded docker/build-omp/PawnREST.so
          strip --strip-unneeded docker/build-samp/PawnREST.so
          strip --strip-unneeded docker/build-omp-static-ssl/PawnREST.so

      - name: Organize Linux artifacts
        run: |
          set -eux
          mkdir -p artifacts/linux
          cp docker/build-omp/PawnREST.so artifacts/linux/PawnREST-omp-linux32.so
          cp docker/build-samp/PawnREST.so artifacts/linux/PawnREST-samp-linux32.so
          cp docker/build-omp-static-ssl/PawnREST.so artifacts/linux/PawnREST-omp-linux32-static-ssl.so

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pawnrest-linux-32bit
          path: |
            artifacts/linux/PawnREST-omp-linux32.so
            artifacts/linux/PawnREST-samp-linux32.so
            artifacts/linux/PawnREST-omp-linux32-static-ssl.so
            PawnREST.inc
          if-no-files-found: error

  windows-simple:
    name: Build Windows PawnREST.dll (32-bit, ${{ matrix.target }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: omp
            build_samp_plugin: OFF
          - target: samp
            build_samp_plugin: ON

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Verify SA-MP SDK availability
        run: |
          if (-not (Test-Path "deps/samp-plugin-sdk/plugincommon.h")) {
            throw "deps/samp-plugin-sdk is missing. Commit it or add it as a git submodule before running CI."
          }
        shell: powershell
    
      - name: Configure CMake for 32-bit
        run: |
          cmake -S . -B build-${{ matrix.target }} -G "Visual Studio 17 2022" -A Win32 -DCMAKE_BUILD_TYPE=MinSizeRel -DBUILD_SAMP_PLUGIN=${{ matrix.build_samp_plugin }}
        shell: powershell
    
      - name: Build
        run: |
          cmake --build build-${{ matrix.target }} --config MinSizeRel --parallel
        shell: powershell
    
      - name: Organize artifacts
        run: |
          New-Item -ItemType Directory -Path "artifacts" -Force | Out-Null
          $dllPath = Get-ChildItem -Path "build-${{ matrix.target }}" -Filter "PawnREST.dll" -Recurse | Select-Object -First 1
          if (-not $dllPath) {
            throw "PawnREST.dll not found for target ${{ matrix.target }}"
          }
          Copy-Item $dllPath.FullName -Destination "artifacts/PawnREST-${{ matrix.target }}-win32.dll" -Force
        shell: powershell
    
      - name: Upload Windows DLL artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pawnrest-windows-${{ matrix.target }}-dll-32bit
          path: |
            artifacts/PawnREST-${{ matrix.target }}-win32.dll
            PawnREST.inc
          if-no-files-found: error
