name: Build PawnREST

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

env:
  CONFIG: MinSizeRel
  LINUX_DOCKER_IMAGE: pawnrest/build:ubuntu-22.04-static-ssl

jobs:
  # ---------------------------------------------------------------------------
  # Gate: verify the Pawn public API compiles before running heavy builds
  # ---------------------------------------------------------------------------
  pawn-api-smoke:
    name: Verify Pawn API
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build Pawn compiler
        run: |
          set -eux
          cmake -S deps/pawn/source/compiler -B build-pawncc \
            -DBUILD_TESTING=OFF \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DCMAKE_C_STANDARD=11
          cmake --build build-pawncc --target pawncc --parallel

      - name: Compile PawnREST smoke script
        run: |
          set -eux
          ./build-pawncc/pawncc \
            "-i${GITHUB_WORKSPACE}" \
            "-i${GITHUB_WORKSPACE}/deps/pawn/include" \
            "${GITHUB_WORKSPACE}/ci/pawnrest_smoke_test.pwn"

  # ---------------------------------------------------------------------------
  # Linux 32-bit builds (4 variants)
  # ---------------------------------------------------------------------------
  linux:
    name: Build Linux 32-bit (${{ matrix.target }}, ${{ matrix.linkage }})
    runs-on: ubuntu-latest
    needs: pawn-api-smoke

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: omp
            linkage: dynamic
            build_samp_plugin: OFF
            tls_static: OFF
            build_dir: build-omp-dynamic
            artifact_name: pawnrest-linux-x86-omp
          - target: omp
            linkage: static
            build_samp_plugin: OFF
            tls_static: ON
            build_dir: build-omp-static
            artifact_name: pawnrest-linux-x86-omp-static
          - target: samp
            linkage: dynamic
            build_samp_plugin: ON
            tls_static: OFF
            build_dir: build-samp-dynamic
            artifact_name: pawnrest-linux-x86-samp
          - target: samp
            linkage: static
            build_samp_plugin: ON
            tls_static: ON
            build_dir: build-samp-static
            artifact_name: pawnrest-linux-x86-samp-static

    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Verify SA-MP SDK availability
        run: |
          test -f deps/samp-plugin-sdk/plugincommon.h || {
            echo "deps/samp-plugin-sdk is missing. Commit it or vendor it before running CI."
            exit 1
          }

      # Cache the Docker image layers so we don't rebuild the toolchain every run.
      # The cache key is tied to the Dockerfile content — it only rebuilds when
      # the Dockerfile actually changes.
      - name: Cache Docker image layers
        uses: actions/cache@v4
        id: docker-cache
        with:
          path: /tmp/docker-cache
          key: docker-${{ env.LINUX_DOCKER_IMAGE }}-${{ hashFiles('docker/build_ubuntu-22.04-static-ssl/Dockerfile') }}
          restore-keys: |
            docker-${{ env.LINUX_DOCKER_IMAGE }}-

      - name: Load cached Docker image (if available)
        if: steps.docker-cache.outputs.cache-hit == 'true'
        run: docker load -i /tmp/docker-cache/image.tar

      - name: Build Linux toolchain image (if not cached)
        if: steps.docker-cache.outputs.cache-hit != 'true'
        run: |
          set -eux
          docker build -t "${LINUX_DOCKER_IMAGE}" docker/build_ubuntu-22.04-static-ssl

      - name: Save Docker image to cache
        if: steps.docker-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p /tmp/docker-cache
          docker save "${LINUX_DOCKER_IMAGE}" -o /tmp/docker-cache/image.tar

      - name: Prepare writable build directory
        run: |
          set -eux
          sudo mkdir -p "docker/${{ matrix.build_dir }}"
          sudo chown 1000:1000 "docker/${{ matrix.build_dir }}"

      - name: Build PawnREST.so
        run: |
          set -eux
          docker run --rm \
            -w /code \
            -v "${{ github.workspace }}:/code" \
            -v "${{ github.workspace }}/docker/${{ matrix.build_dir }}:/code/${{ matrix.build_dir }}" \
            -e CONFIG="${CONFIG}" \
            -e BUILD_DIR="${{ matrix.build_dir }}" \
            -e BUILD_SAMP_PLUGIN="${{ matrix.build_samp_plugin }}" \
            -e PAWNREST_ENABLE_TLS=ON \
            -e PAWNREST_TLS_STATIC_OPENSSL="${{ matrix.tls_static }}" \
            "${LINUX_DOCKER_IMAGE}"

      - name: Normalize build permissions
        run: |
          set -eux
          sudo chown -R "$(id -u):$(id -g)" "docker/${{ matrix.build_dir }}"
          chmod -R u+rwX "docker/${{ matrix.build_dir }}"

      - name: Verify and package Linux artifact
        run: |
          set -eux
          test -f "docker/${{ matrix.build_dir }}/PawnREST.so"
          strip --strip-unneeded "docker/${{ matrix.build_dir }}/PawnREST.so"
          mkdir -p "dist/${{ matrix.artifact_name }}"
          cp "docker/${{ matrix.build_dir }}/PawnREST.so" "dist/${{ matrix.artifact_name }}/PawnREST.so"
          cp PawnREST.inc "dist/${{ matrix.artifact_name }}/PawnREST.inc"

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            dist/${{ matrix.artifact_name }}/PawnREST.so
            dist/${{ matrix.artifact_name }}/PawnREST.inc
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Windows 32-bit builds (4 variants)
  # ---------------------------------------------------------------------------
  windows:
    name: Build Windows 32-bit (${{ matrix.target }}, ${{ matrix.linkage }})
    runs-on: windows-latest
    needs: pawn-api-smoke

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: omp
            linkage: dynamic
            build_samp_plugin: OFF
            tls_static: OFF
            vcpkg_triplet: x86-windows
            artifact_name: pawnrest-windows-x86-omp
          - target: omp
            linkage: static
            build_samp_plugin: OFF
            tls_static: ON
            vcpkg_triplet: x86-windows-static
            artifact_name: pawnrest-windows-x86-omp-static
          - target: samp
            linkage: dynamic
            build_samp_plugin: ON
            tls_static: OFF
            vcpkg_triplet: x86-windows
            artifact_name: pawnrest-windows-x86-samp
          - target: samp
            linkage: static
            build_samp_plugin: ON
            tls_static: ON
            vcpkg_triplet: x86-windows-static
            artifact_name: pawnrest-windows-x86-samp-static

    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Verify SA-MP SDK availability
        shell: powershell
        run: |
          if (-not (Test-Path "deps/samp-plugin-sdk/plugincommon.h")) {
            throw "deps/samp-plugin-sdk is missing. Commit it or vendor it before running CI."
          }

      # ---------------------------------------------------------------------------
      # sccache: compiler output cache — drastically speeds up repeat builds.
      # The action installs sccache and sets SCCACHE_GHA_ENABLED so the binary
      # cache backend (GitHub Actions cache) is used automatically.
      # ---------------------------------------------------------------------------
      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.5

      # ---------------------------------------------------------------------------
      # vcpkg bootstrap
      # We clone vcpkg once per job. The installed packages are cached separately
      # per triplet so each variant only rebuilds when CMakeLists.txt changes.
      # ---------------------------------------------------------------------------
      - name: Bootstrap vcpkg
        shell: powershell
        run: |
          git clone --depth 1 https://github.com/microsoft/vcpkg.git "$env:RUNNER_TEMP\vcpkg"
          & "$env:RUNNER_TEMP\vcpkg\bootstrap-vcpkg.bat" -disableMetrics

      # Cache the compiled vcpkg packages.
      # Key includes the triplet and a hash of CMakeLists.txt so the cache
      # is invalidated only when dependencies or the build definition change.
      - name: Cache vcpkg packages
        uses: actions/cache@v4
        id: vcpkg-cache
        with:
          path: ${{ env.RUNNER_TEMP }}\vcpkg\installed
          key: vcpkg-${{ runner.os }}-${{ matrix.vcpkg_triplet }}-${{ hashFiles('**/CMakeLists.txt') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-${{ matrix.vcpkg_triplet }}-

      - name: Install OpenSSL via vcpkg
        shell: powershell
        run: |
          & "$env:RUNNER_TEMP\vcpkg\vcpkg.exe" install "openssl:${{ matrix.vcpkg_triplet }}"

      # ---------------------------------------------------------------------------
      # CMake configure — 32-bit Visual Studio 2022 with sccache as compiler
      # launcher so incremental / repeated builds hit the cache.
      # ---------------------------------------------------------------------------
      - name: Configure CMake for 32-bit
        shell: powershell
        run: |
          cmake -S . -B build-${{ matrix.target }}-${{ matrix.linkage }} `
            -G "Visual Studio 17 2022" -A Win32 `
            -DCMAKE_BUILD_TYPE=${{ env.CONFIG }} `
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 `
            -DCMAKE_TOOLCHAIN_FILE="$env:RUNNER_TEMP\vcpkg\scripts\buildsystems\vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=${{ matrix.vcpkg_triplet }} `
            -DBUILD_SAMP_PLUGIN=${{ matrix.build_samp_plugin }} `
            -DPAWNREST_ENABLE_TLS=ON `
            -DPAWNREST_TLS_STATIC_OPENSSL=${{ matrix.tls_static }} `
            -DCMAKE_C_COMPILER_LAUNCHER=sccache `
            -DCMAKE_CXX_COMPILER_LAUNCHER=sccache

      - name: Build PawnREST.dll
        shell: powershell
        run: |
          cmake --build build-${{ matrix.target }}-${{ matrix.linkage }} `
            --config ${{ env.CONFIG }} `
            --parallel

      # ---------------------------------------------------------------------------
      # Package: find the plugin DLL and copy only plugin payload (.dll + .inc)
      # Runtime OpenSSL DLLs (dynamic linkage) are packaged separately below so
      # plugin size comparisons stay apples-to-apples with static linkage.
      # ---------------------------------------------------------------------------
      - name: Verify and package Windows artifact
        shell: powershell
        run: |
          $artifactRoot = Join-Path $PWD "dist/${{ matrix.artifact_name }}"
          New-Item -ItemType Directory -Path $artifactRoot -Force | Out-Null

          $dllPath = Get-ChildItem `
            -Path "build-${{ matrix.target }}-${{ matrix.linkage }}" `
            -Filter "PawnREST.dll" `
            -Recurse |
            Select-Object -First 1

          if (-not $dllPath) {
            throw "PawnREST.dll not found for ${{ matrix.target }} (${{ matrix.linkage }})"
          }

          Copy-Item $dllPath.FullName -Destination (Join-Path $artifactRoot "PawnREST.dll") -Force
          Copy-Item "PawnREST.inc"    -Destination (Join-Path $artifactRoot "PawnREST.inc")  -Force

          if ("${{ matrix.linkage }}" -eq "dynamic") {
            $opensslBin = Join-Path $env:RUNNER_TEMP "vcpkg\installed\${{ matrix.vcpkg_triplet }}\bin"
            if (-not (Test-Path $opensslBin)) {
              throw "OpenSSL runtime directory not found: $opensslBin"
            }

            $runtimeDlls = Get-ChildItem -Path $opensslBin -Filter "*.dll" |
              Where-Object { $_.Name -match '^lib(ssl|crypto).*\.dll$' }

            if (-not $runtimeDlls) {
              throw "Expected OpenSSL runtime DLLs not found in $opensslBin"
            }

            $runtimeRoot = Join-Path $PWD "dist/${{ matrix.artifact_name }}-runtime"
            New-Item -ItemType Directory -Path $runtimeRoot -Force | Out-Null
            Copy-Item $runtimeDlls.FullName -Destination $runtimeRoot -Force
          }

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            dist/${{ matrix.artifact_name }}/PawnREST.dll
            dist/${{ matrix.artifact_name }}/PawnREST.inc
          if-no-files-found: error

      - name: Upload Windows runtime artifact (dynamic only)
        if: matrix.linkage == 'dynamic'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-runtime
          path: |
            dist/${{ matrix.artifact_name }}-runtime/libssl-*.dll
            dist/${{ matrix.artifact_name }}-runtime/libcrypto-*.dll
          if-no-files-found: error
