name: Build PawnREST Release Artifacts

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  CONFIG: MinSizeRel
  BUILD_SERVER: "1"

jobs:

  linux-docker:
    name: Build Linux pawnrest.so (32-bit)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Prepare build folder (uid 1000 required by container)
        run: |
          mkdir -p docker/build
          mkdir -p docker/build-static-ssl
          sudo chown 1000:1000 docker/build
          sudo chown 1000:1000 docker/build-static-ssl

      - name: Build Docker image
        run: |
          docker build -t pawnrest/build:ubuntu-18.04 docker/build_ubuntu-18.04/

      - name: Build Docker image (static SSL)
        run: |
          docker build -t pawnrest/build:ubuntu-22.04-static-ssl docker/build_ubuntu-22.04-static-ssl/

      - name: Run build in Docker container
        env:
          CONFIG: ${{ env.CONFIG }}
          BUILD_SERVER: ${{ env.BUILD_SERVER }}
        run: |
          docker run --rm -t \
            -w /code \
            -v "${{ github.workspace }}:/code" \
            -v "${{ github.workspace }}/docker/build:/code/build" \
            -e CONFIG=${CONFIG} \
            -e BUILD_SERVER=${BUILD_SERVER} \
            pawnrest/build:ubuntu-18.04

      - name: Run static SSL build in Docker container
        env:
          CONFIG: ${{ env.CONFIG }}
          BUILD_SERVER: ${{ env.BUILD_SERVER }}
        run: |
          docker run --rm -t \
            -w /code \
            -v "${{ github.workspace }}:/code" \
            -v "${{ github.workspace }}/docker/build-static-ssl:/code/build-static-ssl" \
            -e CONFIG=${CONFIG} \
            -e BUILD_SERVER=${BUILD_SERVER} \
            -e BUILD_DIR=build-static-ssl \
            -e PAWNREST_ENABLE_TLS=ON \
            -e PAWNREST_TLS_STATIC_OPENSSL=ON \
            pawnrest/build:ubuntu-22.04-static-ssl

      - name: Strip Linux binaries
        run: |
          find docker/build docker/build-static-ssl -type f -name "*.so" -print -exec strip --strip-unneeded {} \;

      - name: Rename static SSL artifact
        run: |
          test -f docker/build-static-ssl/pawnrest.so
          cp docker/build-static-ssl/pawnrest.so docker/build-static-ssl/pawnrest-static-ssl.so

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pawnrest-linux-so-32bit
          path: |
            docker/build/**/*.so
            docker/build/*.so
            PawnREST.inc
          if-no-files-found: error

      - name: Upload Linux static SSL artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pawnrest-linux-so-32bit-static-ssl
          path: |
            docker/build-static-ssl/pawnrest-static-ssl.so
            PawnREST.inc
          if-no-files-found: error

  windows-simple:
    name: Build Windows pawnrest.dll (32-bit)
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
    
      - name: Configure CMake for 32-bit
        run: |
          cmake -S . -B build -G "Visual Studio 17 2022" -A Win32 -DCMAKE_BUILD_TYPE=MinSizeRel
        shell: powershell
    
      - name: Build
        run: |
          cmake --build build --config MinSizeRel --parallel
        shell: powershell
    
      - name: Organize artifacts
        run: |
          # Create artifacts folder
          New-Item -ItemType Directory -Path "artifacts" -Force | Out-Null
          
          # Copy PawnREST DLLs to artifacts folder
          Get-ChildItem -Path "build" -Filter "pawnrest*.dll" -Recurse | ForEach-Object {
            Copy-Item $_.FullName -Destination "artifacts\" -Force
            Write-Host "Copied: $($_.Name)"
          }
          
          # List all artifacts
          Write-Host "`n=== Final artifacts ==="
          Get-ChildItem -Path "artifacts" | Format-Table Name, Length
        shell: powershell
    
      - name: Upload Windows DLL artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pawnrest-windows-dll-32bit
          path: |
            artifacts/*.dll
            PawnREST.inc
          if-no-files-found: error
